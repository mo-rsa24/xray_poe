# VAE training config — RunPod real-data run
# Single source of truth consumed by scripts/train_vae.sh.
# All paths are relative to the repo root on the pod (/workspace/Paper3/).
# Adjust batch / grad_checkpoint to the measured max-batch from 00-profile.

# ── data ────────────────────────────────────────────────────────────────────
data: real
data_dir: data/nih/images
csv: data/nih/Data_Entry_2017.csv
val_fraction: 0.05          # 5 % held out for monitoring; not used for gating
num_workers: 8              # tune to pod vCPU count (RunPod A100 usually 16+)

# ── architecture ────────────────────────────────────────────────────────────
res: 512
grad_checkpoint: true       # measured: 7.4 GB/img → fits 48 GB at b≥4; b≥8 comfortable

# ── optimisation ────────────────────────────────────────────────────────────
# steps: measured 50 epochs over 112k images ≈ steps below at the profiled img/s.
# Cap the run and gate on SSIM/LPIPS; stop when the recon gate trips, not at steps.
steps: 150000
batch: 8                    # update to measured max-batch from 00-profile sweep
lr: 1.0e-4
weight_decay: 1.0e-2
ema: true
ema_decay: 0.999

# ── checkpointing ───────────────────────────────────────────────────────────
ckpt_dir: ckpts
ckpt_every: 5000            # ~1 checkpoint per ~40 min at 16 img/s; adjust to budget
ckpt: ckpts/vae_final.pt    # final checkpoint written when the run ends / is killed

# ── logging ─────────────────────────────────────────────────────────────────
log_every: 100
log_images_every: 500       # recon pairs → W&B every 500 steps
manifold_every: 5000        # latent PCA scatter → W&B every 5k steps
wandb_project: paper3-vae   # set to "" to disable W&B
figure: figures/vae_overfit_real.png
